name: Portfolio CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Kodları Sunucuya Çek (Checkout)
      uses: actions/checkout@v3

    - name: 2. .NET 10 Altyapısını Kur
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: 3. Proje Bağımlılıklarını Yükle
      run: dotnet restore PortfolioAdminPanel.csproj

    - name: 4. Projeyi Derle (Build Kontrolü)
      run: dotnet build PortfolioAdminPanel.csproj --no-restore -c Release
      
    - name: 5. Docker Konteynerlerini Test Et (Compose Build)
      run: docker compose build
